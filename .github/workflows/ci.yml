name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run typecheck

      - name: Gatsby build (Netlifyと同等のビルド)
        run: npm run build
