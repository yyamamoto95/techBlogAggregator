name: Daily Digest

on:
  schedule:
    # 毎朝 6:00 JST (21:00 UTC)
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm

      - run: npm ci

      - name: Generate digest
        run: npm run digest
        env:
          # 任意: 設定するとLLM要約が有効になる(未設定ならRSS抜粋で動作)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 任意: 設定するとSlackにも配信される
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No digest changes to commit"
          else
            git commit -m "digest: $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            git push
          fi

      - name: Trigger Netlify rebuild
        if: ${{ env.NETLIFY_BUILD_HOOK != '' }}
        run: curl -fsS -X POST "$NETLIFY_BUILD_HOOK"
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
